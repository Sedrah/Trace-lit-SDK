##############################################################################
# Trace-lit — nginx reverse proxy
#
# Routes:
#   /api/v1/*  →  api:8000   (FastAPI)
#   /api/docs  →  api:8000   (Swagger UI)
#   /api/redoc →  api:8000   (ReDoc)
#   /openapi.json → api:8000
#   /*         →  dashboard:80 (React SPA — served by the dashboard container)
##############################################################################

upstream api {
    server api:8000;
    keepalive 32;
}

upstream dashboard {
    server dashboard:80;
    keepalive 16;
}

server {
    listen 80;
    server_name _;

    # Timeouts
    proxy_connect_timeout   10s;
    proxy_send_timeout      60s;
    proxy_read_timeout      60s;

    # Standard proxy headers
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Disable buffering for streaming responses
    proxy_buffering off;

    # ------------------------------------------------------------------
    # Health check — nginx itself (used by Docker healthcheck)
    # ------------------------------------------------------------------
    location = /health {
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # ------------------------------------------------------------------
    # API — forward everything under /api to the FastAPI service.
    # No trailing slash in proxy_pass so the full /api/... path is kept,
    # matching FastAPI's own route prefixes (/api/v1/*, /api/docs, etc.).
    # ------------------------------------------------------------------
    location /api {
        proxy_pass http://api;
    }

    # ------------------------------------------------------------------
    # Dashboard — all other traffic goes to the React SPA
    # ------------------------------------------------------------------
    location / {
        proxy_pass http://dashboard/;

        # For client-side routing (React Router): return index.html for
        # any path that doesn't match a real file.
        proxy_intercept_errors on;
        error_page 404 = /index.html;
    }
}
