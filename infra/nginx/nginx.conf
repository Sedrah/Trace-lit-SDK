# Trace-lit — nginx reverse proxy
#
# Routes:
#   /api/v1/*  →  api:8000        (FastAPI)
#   /api/docs  →  api:8000        (Swagger UI)
#   /otlp/*    →  ingestion:4318  (OTLP/HTTP receiver)
#   /*         →  dashboard:80    (React SPA)
############################################################################## 
    # ------------------------------------------------------------------
    # Health check — nginx itself (used by Docker healthcheck)
    # ------------------------------------------------------------------
   
    # ------------------------------------------------------------------
  server {
    listen 80;
    server_name trace-lit.com www.trace-lit.com app.trace-lit.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name app.trace-lit.com;

    ssl_certificate /etc/letsencrypt/live/trace-lit.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/trace-lit.com/privkey.pem;

    large_client_header_buffers 4 32k;
    client_header_buffer_size 4k;
    proxy_connect_timeout 10s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_buffering off;

    location = /health {
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    location /api {
        proxy_pass http://api:8000;
    }

    # OTLP/HTTP receiver — strip /otlp prefix before forwarding to ingestion
    location /otlp/ {
        proxy_pass http://ingestion:4318/;
    }

    location / {
        proxy_pass http://dashboard/;
        proxy_intercept_errors on;
        error_page 404 = /index.html;
    }
}

server {
    listen 443 ssl;
    server_name trace-lit.com www.trace-lit.com;

    ssl_certificate /etc/letsencrypt/live/trace-lit.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/trace-lit.com/privkey.pem;

    location / {
        root /usr/share/nginx/landing;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
