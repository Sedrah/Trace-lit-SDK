##############################################################################
# AMO — Production self-host stack
#
# Usage:
#   cp .env.example .env          # fill in passwords
#   docker compose up -d
#   open http://localhost          # dashboard
#   open http://localhost/api/docs # API docs
#
# All data is stored in named Docker volumes (survives container restarts).
##############################################################################

name: trace-lit

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:

  # --------------------------------------------------------------------------
  # Message broker
  # --------------------------------------------------------------------------

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_log:/var/lib/zookeeper/log
    logging: *default-logging
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # Two listeners:
      #   INTERNAL — used by other containers (ingestion, api) inside Docker network
      #   EXTERNAL — used by SDK clients connecting from outside the server
      # SERVER_IP is set in .env to your Hetzner public IP.
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://${SERVER_IP}:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168      # 7 days — replay window
      KAFKA_LOG_SEGMENT_BYTES: 536870912  # 512 MB
    ports:
      - "9093:9093"   # external SDK access — testers point their kafka_brokers here
    volumes:
      - kafka_data:/var/lib/kafka/data
    logging: *default-logging
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # --------------------------------------------------------------------------
  # Trace storage
  # --------------------------------------------------------------------------

  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    restart: unless-stopped
    environment:
      CLICKHOUSE_USER: ${TRACELIT_CLICKHOUSE_USER:-tracelit}
      CLICKHOUSE_PASSWORD: ${TRACELIT_CLICKHOUSE_PASSWORD:-tracelit_clickhouse_password}
      CLICKHOUSE_DB: ${TRACELIT_CLICKHOUSE_DATABASE:-trace_lit}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - clickhouse_logs:/var/log/clickhouse-server
      - ./init/clickhouse:/docker-entrypoint-initdb.d:ro
      - ./clickhouse/config:/etc/clickhouse-server/config.d:ro
    ports:
      - "127.0.0.1:8123:8123"   # HTTP (localhost only)
      - "127.0.0.1:9000:9000"   # Native (localhost only)
    logging: *default-logging
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

  # --------------------------------------------------------------------------
  # Metrics storage
  # --------------------------------------------------------------------------

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tracelit}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tracelit_pg_password}
      POSTGRES_DB: ${POSTGRES_DB:-trace_lit}
    volumes:
      - timescale_data:/var/lib/postgresql/data
      - ./init/timescale:/docker-entrypoint-initdb.d:ro
    ports:
      - "127.0.0.1:5432:5432"   # localhost only
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tracelit} -d ${POSTGRES_DB:-trace_lit}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # --------------------------------------------------------------------------
  # AMO services
  # --------------------------------------------------------------------------

  ingestion:
    build:
      context: ${COMPOSE_CONTEXT:-.}
      dockerfile: ingestion/Dockerfile
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    env_file: ../.env
    environment:
      TRACELIT_KAFKA_BROKERS: kafka:9092
      TRACELIT_CLICKHOUSE_HOST: clickhouse
      TRACELIT_TIMESCALE_DSN: postgresql://${POSTGRES_USER:-tracelit}:${POSTGRES_PASSWORD:-tracelit_pg_password}@timescaledb:5432/${POSTGRES_DB:-trace_lit}
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'pipeline.main' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  api:
    build:
      context: ${COMPOSE_CONTEXT:-.}
      dockerfile: api/Dockerfile
    restart: unless-stopped
    depends_on:
      clickhouse:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    env_file: ../.env
    environment:
      TRACELIT_CLICKHOUSE_HOST: clickhouse
      TRACELIT_TIMESCALE_DSN: postgresql://${POSTGRES_USER:-tracelit}:${POSTGRES_PASSWORD:-tracelit_pg_password}@timescaledb:5432/${POSTGRES_DB:-trace_lit}
      TRACELIT_CORS_ORIGINS: http://localhost,http://localhost:80
    logging: *default-logging
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s   # allow time for ClickHouse init on first boot

  dashboard:
    build:
      context: ${COMPOSE_CONTEXT:-.}
      dockerfile: dashboard/Dockerfile
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started   # don't wait for healthy — api may restart once on first boot
    logging: *default-logging

  # --------------------------------------------------------------------------
  # Reverse proxy — single entry point for dashboard + API
  # --------------------------------------------------------------------------

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - dashboard
      - api
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    logging: *default-logging
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost/health"]
      interval: 10s
      timeout: 5s
      retries: 5

# --------------------------------------------------------------------------
# Named volumes — all data persists across restarts
# --------------------------------------------------------------------------

volumes:
  zookeeper_data:
  zookeeper_log:
  kafka_data:
  clickhouse_data:
  clickhouse_logs:
  timescale_data:
